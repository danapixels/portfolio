version: '3.8'

services:
  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=/api
      - ADMIN_KEY=${ADMIN_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - PASSWORD_HASH=${PASSWORD_HASH}
      - PORT=3001
    env_file:
      - .env.prod
    restart: unless-stopped
    volumes:
      # Mount SSL certificates (you need to provide these)
      - ./ssl:/etc/nginx/ssl:ro
      # Mount logs for debugging
      - ./logs:/var/log/nginx
      # Mount stamps data (optional - for persistence)
      - ./data:/app/server/data
    networks:
      - portfolio-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  portfolio-prod:
    driver: bridge 